<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="A viewer for high bit depth, high resolution, multi-channel images"
    />
    <title>AVIVATOR</title>
    <script type="module" crossorigin src="/viewer/assets/index-CNHS5_Ze.js"></script>
    <link rel="stylesheet" crossorigin href="/viewer/assets/index-DNX-HtEM.css">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Patch fetch to also send Gen3 credentials header (runs after
      // the bundled Avivator's own patch that adds X-Synapse-Token).
      (function() {
        var _origFetch = window.fetch;
        window.fetch = function(input, init) {
          var url = typeof input === 'string' ? input : (input && input.url) || '';
          if (url.includes('/image/')) {
            init = Object.assign({}, init);
            var h = new Headers(init.headers || {});
            var creds = sessionStorage.getItem('gen3_credentials');
            if (creds) h.set('X-Gen3-Credentials', creds);
            init.headers = h;
          }
          return _origFetch.call(this, input, init);
        };
      })();
    </script>
  </body>
</html>
