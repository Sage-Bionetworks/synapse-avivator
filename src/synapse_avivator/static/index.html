<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>synapse-avivator</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; line-height: 1.6; }
    input { width: 100%; padding: 8px; font-size: 16px; margin: 8px 0; box-sizing: border-box; }
    button { padding: 8px 24px; font-size: 16px; cursor: pointer; }
    .status { color: #666; font-size: 14px; margin-top: 16px; }
    .token-section { background: #f5f5f5; padding: 16px; border-radius: 8px; margin-bottom: 24px; }
    .token-section p { margin: 0 0 8px 0; font-size: 14px; color: #666; }
    .hidden { display: none; }
    .connected { color: #2a7; font-weight: bold; }
  </style>
</head>
<body>
  <h1>synapse-avivator</h1>

  <div id="token-section" class="token-section hidden">
    <p>Paste your Synapse Personal Access Token (<a href="https://www.synapse.org/#!PersonalAccessTokens:" target="_blank">get one here</a>). It stays in your browser and is never stored on the server.</p>
    <input id="token" type="password" placeholder="Synapse Personal Access Token" />
    <button onclick="saveToken()">Connect</button>
    <span id="token-status"></span>
  </div>

  <div id="main-ui">
    <p>Enter a Synapse entity ID or DRS URI to view in Avivator:</p>
    <input id="entity" type="text" placeholder="syn74326609 or drs://nci-crdc.datacommons.io/..." />
    <button onclick="go()">Open in Avivator</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    // Auto-load if image_url is in query params (set by CLI)
    const params = new URLSearchParams(window.location.search);
    const imageUrl = params.get("image_url");
    if (imageUrl) {
      window.location.href = "https://avivator.gehlenborglab.org/?image_url=" + encodeURIComponent(imageUrl);
    }

    // Check if we're in hosted mode
    fetch("/auth/me").then(r => r.json()).then(data => {
      if (data.mode === "hosted") {
        document.getElementById("token-section").classList.remove("hidden");
        // Restore token from sessionStorage
        const saved = sessionStorage.getItem("synapse_token");
        if (saved) {
          document.getElementById("token").value = saved;
          document.getElementById("token-status").innerHTML = '<span class="connected">Connected</span>';
        }
      }
    }).catch(() => {
      // hosted mode, 401
      document.getElementById("token-section").classList.remove("hidden");
    });

    function saveToken() {
      const token = document.getElementById("token").value.trim();
      if (!token) return;
      sessionStorage.setItem("synapse_token", token);
      document.getElementById("token-status").innerHTML = '<span class="connected">Connected</span>';
    }

    function go() {
      const eid = document.getElementById("entity").value.trim();
      let url;
      if (eid.startsWith("drs://")) {
        const path = eid.slice("drs://".length);
        url = window.location.origin + "/image/drs/" + path + ".ome.tiff";
      } else if (eid.match(/^syn\d+$/)) {
        url = window.location.origin + "/image/" + eid + ".ome.tiff";
      } else {
        document.getElementById("status").textContent = "Enter a Synapse ID (syn...) or DRS URI (drs://...)";
        return;
      }

      // In hosted mode, Avivator can't send custom headers to our proxy.
      // So we encode the token in the URL as a query param that the proxy strips.
      const token = sessionStorage.getItem("synapse_token");
      if (token) {
        url += "?token=" + encodeURIComponent(token);
      }

      window.location.href = "https://avivator.gehlenborglab.org/?image_url=" + encodeURIComponent(url);
    }

    document.getElementById("entity").addEventListener("keydown", e => {
      if (e.key === "Enter") go();
    });
  </script>
</body>
</html>
